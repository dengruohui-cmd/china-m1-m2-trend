<!-- 引入数据文件（由 GitHub Actions 自动生成） -->
<script src="data.js"></script>
<script>
    var chartDom = document.getElementById('chart');
    var myChart = echarts.init(chartDom);
    
    var option = {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            formatter: function(params) {
                let date = params[0].axisValue;
                // 提取 M1, M2, 居民存款的值（注意顺序与 series 对应）
                let m1Val = (params[0].value / 10000).toFixed(1);
                let m2Val = (params[1].value / 10000).toFixed(1);
                let depositVal = (params[2].value / 10000).toFixed(1);
                return `${date}<br/>M1: ${m1Val} 万亿元<br/>M2: ${m2Val} 万亿元<br/>居民存款: ${depositVal} 万亿元`;
            }
        },
        legend: {
            data: ['M1 (狭义货币)', 'M2 (广义货币)', '居民存款'],
            left: 'center',
            top: 0,
            icon: 'circle'
        },
        grid: {
            left: '8%',
            right: '8%',
            bottom: '8%',
            top: '12%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: chartData.xAxis,
            axisLabel: {
                rotate: 45,
                interval: 'auto',
                fontSize: 10
            },
            name: '日期',
            nameLocation: 'middle',
            nameGap: 35
        },
        yAxis: {
            type: 'value',
            name: '货币供应量 (万亿元)',
            axisLabel: {
                formatter: function(value) {
                    return (value / 10000).toFixed(0);
                }
            },
            scale: true
        },
        series: [
            {
                name: 'M1 (狭义货币)',
                type: 'line',
                data: chartData.m1,
                symbol: 'circle',
                symbolSize: 4,
                lineStyle: { width: 2, color: '#E76F51' },
                itemStyle: { color: '#E76F51' },
                smooth: false,
                tooltip: { valueFormatter: (value) => (value / 10000).toFixed(1) + ' 万亿元' }
            },
            {
                name: 'M2 (广义货币)',
                type: 'line',
                data: chartData.m2,
                symbol: 'circle',
                symbolSize: 4,
                lineStyle: { width: 2, color: '#2E86AB' },
                itemStyle: { color: '#2E86AB' },
                smooth: false,
                tooltip: { valueFormatter: (value) => (value / 10000).toFixed(1) + ' 万亿元' }
            },
            {
                name: '居民存款',
                type: 'line',
                data: chartData.householdDeposit,
                symbol: 'diamond',
                symbolSize: 4,
                lineStyle: { width: 2, color: '#A23B72' },
                itemStyle: { color: '#A23B72' },
                smooth: false,
                tooltip: { valueFormatter: (value) => (value / 10000).toFixed(1) + ' 万亿元' }
            }
        ]
    };
    
    myChart.setOption(option);
    window.addEventListener('resize', function() { myChart.resize(); });
    
    // 显示更新时间（不变）
    fetch('https://api.github.com/repos/你的用户名/仓库名/commits?path=docs/data.js&per_page=1')
        .then(res => res.json())
        .then(data => {
            if (data[0] && data[0].commit) {
                let date = new Date(data[0].commit.committer.date);
                document.getElementById('updateTime').innerText = '最新数据：' + date.toLocaleString('zh-CN');
            }
        })
        .catch(() => {
            document.getElementById('updateTime').innerText = '更新日期：请查看仓库';
        });
</script>
