<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>中国M1/M2货币供应量趋势</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .sub {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #999;
        }
        .update-time {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>中国M1/M2货币供应量月度趋势</h1>
    <div class="sub">数据来源：国家统计局（中国人民银行口径）</div>
    <img src="m1_m2_trend.png" alt="M1/M2趋势图" style="width:100%; max-width:800px;">
    <div class="update-time" id="updateTime">更新日期：加载中...</div>
    <div class="footer">自动更新 | 每月15日左右发布新数据</div>
    <script>
        // 显示最后更新时间（从GitHub API获取图片最后提交时间）
        fetch('https://api.github.com/repos/dengruohui/china-m1-m2-trend/commits?path=docs/m1_m2_trend.png&per_page=1')
            .then(res => res.json())
            .then(data => {
                if (data[0] && data[0].commit) {
                    let date = new Date(data[0].commit.committer.date);
                    document.getElementById('updateTime').innerText = '最新数据：' + date.toLocaleString('zh-CN');
                }
            })
            .catch(() => {
                document.getElementById('updateTime').innerText = '更新日期：请查看仓库';
            });
    </script>
</body>
</html>
